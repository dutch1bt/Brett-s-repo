name: Reserve Sunday Tee Time

on:
  schedule:
    # Fire at 10:00 UTC (6:00 AM EDT summer / 5:00 AM EST winter).
    # GitHub cron runs ~45-50 min late on Sundays, so we start an hour early.
    # The "Wait" step below sleeps until exactly 7:29 AM America/Toronto,
    # handling the EDT/EST switch automatically.
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to book (YYYY-MM-DD). Leave empty to auto-compute 14 days out.'
        required: false
        default: ''
      time_preference:
        description: 'Preferred tee time e.g. "1:00 PM". Leave empty for earliest available.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — set to true to check availability without booking'
        required: false
        default: 'false'

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Wait until 7:30 AM Eastern
        if: github.event_name == 'schedule'
        run: |
          # Compute 7:30 AM America/Toronto (handles EDT and EST automatically).
          TARGET=$(python3 -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          tz = ZoneInfo('America/Toronto')
          t = datetime.now(tz).replace(hour=7, minute=29, second=0, microsecond=0)
          print(int(t.timestamp()))
          ")
          NOW=$(date -u +%s)
          DIFF=$((TARGET - NOW))
          if [ $DIFF -gt 0 ]; then
            echo "Waiting ${DIFF}s until 7:29 AM Eastern..."
            sleep $DIFF
          else
            echo "Already past 7:29 AM Eastern (diff=${DIFF}s) — booking immediately."
          fi

      - name: Book tee time
        id: book
        env:
          GOLF_CLUB_NAME: Lakelands Golf and Country Club
          GOLF_CLUB_USERNAME: ${{ secrets.GOLF_CLUB_USERNAME }}
          GOLF_CLUB_PASSWORD: ${{ secrets.GOLF_CLUB_PASSWORD }}
          AUTO_RESERVE_PLAYERS: ${{ secrets.AUTO_RESERVE_PLAYERS }}
          AUTO_RESERVE_PLAYER_NAMES: ${{ secrets.AUTO_RESERVE_PLAYER_NAMES }}
          AUTO_RESERVE_PREFERRED_TIME: '7:30 AM'
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.time_preference }}" ]; then
            ARGS="$ARGS --time '${{ github.event.inputs.time_preference }}'"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          eval python auto_reserve.py $ARGS

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          if-no-files-found: ignore

      - name: Send SMS notification
        if: always()
        env:
          PHONE: ${{ secrets.PHONE_NUMBER }}
          GROUP_PHONES: ${{ secrets.GROUP_PHONE_NUMBERS }}
          TEXTBELT_KEY: ${{ secrets.TEXTBELT_KEY }}
        run: |
          if [ -z "$PHONE" ]; then
            echo "PHONE_NUMBER secret not set — skipping SMS"
            exit 0
          fi

          KEY="${TEXTBELT_KEY:-textbelt}"

          # Compute target date
          TARGET=$(python3 -c "
          from datetime import date, timedelta
          override = '${{ github.event.inputs.date }}'
          if override:
              print(override)
          else:
              print((date.today() + timedelta(days=14)).strftime('%Y-%m-%d'))
          ")

          OUTCOME="${{ steps.book.outcome }}"

          send_sms() {
            local NUMBER="$1"
            local MSG="$2"
            curl -s -X POST https://textbelt.com/text \
              --data-urlencode "phone=$NUMBER" \
              --data-urlencode "message=$MSG" \
              -d "key=$KEY" || echo "SMS to $NUMBER failed"
          }

          if [ "$OUTCOME" = "success" ]; then
            # Read booked time and players from result file
            SUCCESS_MSG=$(python3 -c "import json; d=json.load(open('booking_result.json')); dt=d.get('date','TBD'); tm=d.get('time','TBD'); players=', '.join(d.get('players',[])); print(f\"Sandbagger Tee Hawk 🤖 🦅: You Sandbaggin' sons of bitches just got a tee time sniped at Lakelands DeVries Signature Track - {dt} at {tm} - {players}\n\nRob giving out some strokes out, unlucky...\")" 2>/dev/null || printf "Sandbagger Tee Hawk 🤖 🦅: You Sandbaggin' sons of bitches just got a tee time sniped at Lakelands DeVries Signature Track\n\nRob giving out some strokes out, unlucky...")
            # Text everyone in the group
            PHONES="${GROUP_PHONES:-$PHONE}"
            IFS=',' read -ra NUMS <<< "$PHONES"
            for NUM in "${NUMS[@]}"; do
              NUM=$(echo "$NUM" | tr -d ' ')
              [ -n "$NUM" ] && send_sms "$NUM" "$SUCCESS_MSG"
            done
          else
            # Only text Brett on failure
            FAIL_MSG="Sandbagger Tee Hawk 🤖 🦅: Booking FAILED for $TARGET. Check the Actions logs on the tee time bot."
            send_sms "$PHONE" "$FAIL_MSG"
          fi
