<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandbaggers — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #052e16;
      color: #f0fdf4;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #4ade80; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">⛳</div>
  <h1>You're Offline</h1>
  <p>No signal on the back nine?<br/>Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
